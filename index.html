<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird MMO: Freddy bear</title>
    <style>
        body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;font-family:'Courier New',monospace;color:white;padding:10px;box-sizing:border-box;}
        .container{display:flex;gap:20px;background:#222;padding:20px;border:4px solid #444;box-shadow:10px 10px 0px #000;border-radius:15px;max-width:100%;box-sizing:border-box;}
        canvas{border:4px solid #444;border-radius:12px;image-rendering:pixelated;max-width:100%;height:auto;display:block;}
        .side-panel{display:flex;flex-direction:column;gap:15px;width:540px;max-width:100%;}
        .shop,.multiplayer-box{background:#000;padding:15px;display:flex;flex-direction:column;gap:10px;border:4px solid #444;border-radius:10px;}
        .row-widgets{display:flex;gap:15px;width:100%;}
        .leaderboard,.settings{flex:1;background:#000;padding:15px;display:flex;flex-direction:column;gap:10px;border:4px solid #444;border-radius:10px;}
        h2{margin:0;text-align:center;color:#fff;font-size:16px;text-transform:uppercase;border-bottom:4px dashed #444;padding-bottom:8px;}
        .coins-display{color:#ffd700;font-size:16px;text-align:center;font-weight:bold;background:#222;padding:8px;border:2px solid #ffd700;}
        .mp-btn{background:#1565c0;color:white;border:2px solid #fff;padding:8px;cursor:pointer;font-weight:bold;font-family:inherit;font-size:12px;text-transform:uppercase;}
        .mp-input{background:#222;border:2px solid #444;color:#fff;padding:8px;font-family:inherit;text-align:center;font-size:11px;width:100%;box-sizing:border-box;word-break:break-all;}
        .skin-item,.leader-item{display:flex;align-items:center;justify-content:space-between;background:#111;padding:8px 12px;border:2px solid #333;}
        .skin-name{font-weight:bold;font-size:14px;text-transform:uppercase;}
        .shop-btn{background:#00aa00;color:white;border:2px solid #fff;padding:6px 10px;cursor:pointer;font-weight:bold;min-width:85px;font-family:inherit;}
        .shop-btn:disabled {background:#444;color:#888;cursor:not-allowed;border-color:#555;}
        .shop-btn.equipped{background:#0000aa;}
        .setting-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;background:#111;padding:8px 12px;border:2px solid #333;}
        .setting-row input {cursor:pointer;width:16px;height:16px;}
        .place-1{color:#ffd700;font-weight:bold;}
        .place-2{color:#b0bec5;font-weight:bold;}
        .place-3{color:#b07d62;font-weight:bold;}
        @media (max-width:768px){
            body{align-items:flex-start;overflow-y:auto;}
            .container{flex-direction:column;align-items:center;gap:15px;padding:10px;border-width:3px;box-shadow:5px 5px 0px #000;}
            canvas{width:100%;height:auto;max-width:400px;}
            .side-panel{width:100%;max-width:400px;}
            .row-widgets{flex-direction:column;gap:15px;}
        }
    </style>
</head>
<body>
<div class="container"> 
    <canvas id="canvas" width="400" height="500"></canvas> 
    <div class="side-panel">
        <div class="multiplayer-box">
            <h2>ONLINE MULTIPLAYER</h2>
            <div id="mp-menu-buttons" style="display:flex; gap:10px;">
                <button class="mp-btn" style="flex:1;" onclick="startHost()">CREATE ROOM</button>
                <button class="mp-btn" style="flex:1; background:#2e7d32;" onclick="startJoin()">JOIN ROOM</button>
            </div>
            <div id="mp-area" style="display:flex; flex-direction:column; gap:8px; margin-top:5px;"></div>
            <div id="mp-status" style="text-align:center;font-size:12px;color:#aaa;">Одиночный режим</div>
        </div>
        <div class="shop"> 
            <h2>SHOP</h2> 
            <div class="coins-display">COINS: <span id="coin-count">0</span></div> 
            <div id="shop-items"></div> 
        </div> 
        <div class="row-widgets">
            <div class="leaderboard">
                <h2>WORLD TOP 3</h2>
                <div id="leader-items">Loading...</div>
            </div>
            <div class="settings">
                <h2>AUDIO</h2>
                <div class="setting-row"><span>MUSIC</span><input type="checkbox" id="music-toggle" checked></div>
                <div class="setting-row"><span>SFX</span><input type="checkbox" id="sfx-toggle" checked></div>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
let bird = {x: 50, y: 150, w: 34, h: 24, gravity: 0.4, velocity: 0, jump: -6.2};
let enemyBird = {y: 150, active: false, currentSkinId: 'default'};
let pipes = [], score = 0, gameOver = false, recordChecked = false;

let myPlayerName = localStorage.getItem('flappy_device_name_v9');
if (!myPlayerName || myPlayerName === "null" || myPlayerName.trim() === "") {
    let userName = prompt("ГЛОБАЛЬНЫЙ ОНЛАЙН-ТУРНИР! Введите имя:", "Игрок");
    if (!userName || !userName.trim()) userName = "User-" + Math.floor(1000 + Math.random() * 9000);
    myPlayerName = userName.substring(0, 10).trim().replace(/[^a-zA-Z0-9а-яА-Я]/g, "");
    localStorage.setItem('flappy_device_name_v9', myPlayerName);
}

let localConnection = null, dataChannel = null, isHost = false;
const musicToggle = document.getElementById("music-toggle"), sfxToggle = document.getElementById("sfx-toggle");
let audioCtx = null, musicInterval = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audioCtx && !musicInterval) startAmbientMusic();
}

function playSound(freq, duration, type = 'sine', ramp = true) {
    if (!sfxToggle.checked) return;
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } }
    if (audioCtx.state === 'suspended') return;
    try {
        let osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (ramp) osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + duration);
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch (e) {}
}

function startAmbientMusic() {
    if (musicInterval) clearInterval(musicInterval);
    let notes = [130.81, 146.83, 164.81, 196.00], step = 0;
    musicInterval = setInterval(() => {
        if (musicToggle.checked && audioCtx && audioCtx.state === 'running' && !gameOver) {
            try {
                let osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.02, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.8); step++;
            } catch (e) {}
        }
    }, 1000);
}

let timeProgress = 0;
function getSkyColor() {
    timeProgress += 0.0003; if (timeProgress > 1) timeProgress = 0;
    let r, g, b;
    if (timeProgress < 0.33) { let t = timeProgress / 0.33; r = 112 + (235 - 112) * t; g = 197 + (100 - 197) * t; b = 206 + (60 - 206) * t; }
    else if (timeProgress < 0.66) { let t = (timeProgress - 0.33) / 0.33; r = 235 + (20 - 235) * t; g = 100 + (22 - 100) * t; b = 60 + (40 - 60) * t; }
    else { let t = (timeProgress - 0.66) / 0.34; r = 2 + (112 - 2) * t; g = 22 + (197 - 22) * t; b = 40 + (206 - 40) * t; }
    return "rgb(" + Math.floor(r) + "," + Math.floor(g) + "," + Math.floor(b) + ")";
}

const birdMapRaw = ["00000111111000000", "00001222222110000", "00112222221331000", "01225522213113100", "12222552213113100", "12222222221331000", "12222222222111100", "1222222224444410", "0122222241111410", "0011222441114100", "0000114444441000", "0000001111110000"];

const skins = [
    {id: 'default', name: 'Classic Duck', color: '#f8e71c', beak: '#ff5722', hat: false, price: 0, purchased: true},
    {id: 'cyber', name: 'Cyber Agent', color: '#00e5ff', beak: '#ff007f', hat: false, price: 50, purchased: false},
    {id: 'pirate', name: 'Pirate Bird', color: '#4e342e', beak: '#ffb300', hat: true, price: 100, purchased: false},
    {id: 'freddy', name: 'FNAF Freddy', color: '#6d4c41', beak: '#3e2723', hat: true, price: 150, purchased: false},
    {id: 'king', name: 'Rich King', color: '#ffd700', beak: '#d84315', hat: true, price: 300, purchased: false}
];
let currentSkin = skins[0]; // НАВСЕГДА ИСПРАВЛЕНО: берётся строго первая утка, серый экран не появится!
let personalBest = parseInt(localStorage.getItem('flappy_personal_best')) || 0;
let localLeaderboard = JSON.parse(localStorage.getItem('flappy_local_top4')) || [];
function sendHighScoreOnline(finalScore) {
    if (finalScore <= 0) return;
    if (finalScore > personalBest) {
        personalBest = finalScore;
        localStorage.setItem('flappy_personal_best', personalBest);
    }
    let existing = localLeaderboard.find(p => p.name === myPlayerName);
    if (existing) {
        if (finalScore > existing.score) existing.score = finalScore;
    } else {
        localLeaderboard.push({name: myPlayerName, score: finalScore});
    }
    fetchOnlineLeaderboard();
}

function fetchOnlineLeaderboard() {
    const container = document.getElementById("leader-items");
    if (!container) return; container.innerHTML = "";
    localLeaderboard.sort((a, b) => parseInt(b.score) - parseInt(a.score));
    localLeaderboard = localLeaderboard.slice(0, 3);
    localStorage.setItem('flappy_local_top4', JSON.stringify(localLeaderboard));

    if (localLeaderboard.length === 0) {
        container.innerHTML = "<div style='text-align:center;color:#666;padding:5px 0;'>НЕТ РЕКОРДОВ</div>";
    } else {
        localLeaderboard.forEach((player, index) => {
            const item = document.createElement("div"); item.className = "leader-item";
            let placeClass = "place-" + (index + 1);
            item.innerHTML = `<span class="${placeClass}">#${index + 1} ${player.name}</span><span style='font-weight:bold'>${player.score}</span>`;
            container.appendChild(item);
        });
    }
    const personalItem = document.createElement("div");
    personalItem.className = "leader-item"; personalItem.style.marginTop = "8px"; personalItem.style.borderColor = "#ffd700";
    personalItem.innerHTML = `<span>MY BEST (${myPlayerName})</span><span style='font-weight:bold;color:#ffd700'>${personalBest}</span>`;
    container.appendChild(personalItem);
}

const configuration = {'iceServers': [{'urls': 'stun:://google.com'}]};

function startHost() {
    document.getElementById("mp-menu-buttons").style.display = "none";
    document.getElementById("mp-status").innerHTML = "Генерация кода комнаты...";
    isHost = true;
    localConnection = new RTCPeerConnection(configuration);
    dataChannel = localConnection.createDataChannel("gameChannel");
    setupChannelListeners();
    localConnection.onicecandidate = e => { 
        if(!e.candidate) { 
            let token = btoa(JSON.stringify(localConnection.localDescription));
            document.getElementById("mp-area").innerHTML = `
                <span style="font-size:11px;color:#ffd700;">1. Скопируй этот код и отправь другу:</span>
                <input class="mp-input" type="text" value="${token}" onclick="this.select()" readonly>
                <span style="font-size:11px;margin-top:5px;">2. Вставь ответный код друга снизу:</span>
                <input id="join-code-input" class="mp-input" placeholder="Вставь ответ друга сюда...">
                <button class="mp-btn" style="margin-top:5px;background:#2e7d32;width:100%;" onclick="acceptAnswer()">3. ПОДКЛЮЧИТЬ ИГРОКА</button>
            `; 
            document.getElementById("mp-status").innerHTML = "Ожидание ответа от друга...";
        }
    };
    localConnection.createOffer().then(o => localConnection.setLocalDescription(o));
}

function acceptAnswer() {
    let ans = document.getElementById("join-code-input").value;
    if(!ans.trim()) return alert("Сначала вставьте ответный код друга!");
    try {
        localConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(ans))));
    } catch(e) { alert("Ошибка кода! Перепроверьте текст."); }
}

function startJoin() {
    document.getElementById("mp-menu-buttons").style.display = "none";
    document.getElementById("mp-area").innerHTML = `
        <span style="font-size:11px;color:#2e7d32;">1. Вставь код, который тебе скинул Хост:</span>
        <input id="host-code-input" class="mp-input" placeholder="Вставь код хоста сюда...">
        <button class="mp-btn" style="margin-top:5px;width:100%;" onclick="executeJoin()">2. СГЕНЕРИРОВАТЬ ОТВЕТ</button>
    `;
    document.getElementById("mp-status").innerHTML = "Ожидание ввода кода...";
}

function executeJoin() {
    let code = document.getElementById("host-code-input").value;
    if(!code.trim()) return alert("Вставьте код хоста!");
    isHost = false; 
    localConnection = new RTCPeerConnection(configuration);
    localConnection.ondatachannel = e => { dataChannel = e.channel; setupChannelListeners(); };
    try {
        localConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(atob(code))));
        localConnection.onicecandidate = e => { 
            if(!e.candidate) { 
                let token = btoa(JSON.stringify(localConnection.localDescription));
                document.getElementById("mp-area").innerHTML = `
                    <span style="font-size:11px;color:#ffd700;">3. Скопируй этот ответный код и отправь Хосту:</span>
                    <input class="mp-input" type="text" value="${token}" onclick="this.select()" readonly>
                `; 
                document.getElementById("mp-status").innerHTML = "Код ответа готов! Перешли его Создателю.";
            }
        };
        localConnection.createAnswer().then(a => localConnection.setLocalDescription(a));
    } catch(e) { alert("Неверный код хоста!"); }
}

function setupChannelListeners() {
    dataChannel.onopen = () => {
        document.getElementById("mp-status").innerHTML = "🟢 МУЛЬТИПЛЕЕР АКТИВЕН! ИГРАЕМ!";
        document.getElementById("mp-area").innerHTML = "";
        enemyBird.active = true;
    };
    dataChannel.onmessage = (e) => {
        try {
            let data = JSON.parse(e.data);
            if(data.type === 'fly') { enemyBird.active = true; enemyBird.y = data.y; enemyBird.currentSkinId = data.skin; }
            if(data.type === 'pipe' && !isHost) { pipes = JSON.parse(data.pipes); }
        } catch(err){}
    };
}
function updateShopUI() {
    let walletCoins = parseInt(localStorage.getItem('flappy_total_coins')) || 0;
    const countSpan = document.getElementById("coin-count"); if (countSpan) countSpan.innerText = walletCoins;
    const container = document.getElementById("shop-items"); if (!container) return; container.innerHTML = "";
    skins.forEach(skin => {
        let isSavedPurchased = localStorage.getItem('skin_buy_' + skin.id) || skin.price === 0; if (isSavedPurchased) skin.purchased = true;
        const item = document.createElement("div"); item.className = "skin-item";
        let btnText = skin.purchased ? "EQUIP" : skin.price + ""; let btnClass = "shop-btn"; if (skin.id === currentSkin.id) { btnText = "ACTIVE"; btnClass += " equipped"; }
        let isLocked = (!skin.purchased) && (walletCoins < skin.price); let disabledAttr = isLocked ? "disabled" : "";
        item.innerHTML = "<div class=\"skin-info\"><span class=\"skin-name\">" + skin.name + "</span></div><button class=\"" + btnClass + "\" " + disabledAttr + " onclick=\"buyOrEquip('" + skin.id + "')\">" + btnText + "</button>"; container.appendChild(item);
    });
}

window.buyOrEquip = function (id) {
    initAudio(); const skin = skins.find(s => s.id === id); let walletCoins = parseInt(localStorage.getItem('flappy_total_coins')) || 0;
    if (skin.purchased) { currentSkin = skin; playSound(587.33, 0.15, 'square', false); }
    else if (walletCoins >= skin.price) {
        walletCoins -= skin.price; localStorage.setItem('flappy_total_coins', walletCoins); localStorage.setItem('skin_buy_' + skin.id, true); skin.purchased = true; currentSkin = skin; playSound(880, 0.3, 'square', false);
    }
    updateShopUI();
}

function drawPixelRect(x, y, w, h, fillColor, strokeColor = "#000") { ctx.fillStyle = fillColor; ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h)); if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = 2; ctx.strokeRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h)); } }

function drawPixelBird(bx, by, skinId) {
    let targetSkin = skins.find(s => s.id === skinId) || skins; let pSize = 2;
    for (let r = 0; r < birdMapRaw.length; r++) {
        for (let c = 0; c < birdMapRaw[r].length; c++) {
            let pixelChar = birdMapRaw[r][c]; if (pixelChar === "0") continue;
            let px = bx + (c * pSize), py = by + (r * pSize), color = "#000";
            if (pixelChar === "1") color = "#000"; else if (pixelChar === "2") color = targetSkin.color; else if (pixelChar === "3") color = (targetSkin.id === 'cyber') ? '#ff007f' : '#fff'; else if (pixelChar === "4") color = targetSkin.beak; else if (pixelChar === "5") color = (targetSkin.id === 'cyber') ? '#00e5ff' : '#fff';
            ctx.fillStyle = color; ctx.fillRect(Math.floor(px), Math.floor(py), pSize, pSize);
        }
    }
    if (targetSkin.id === 'freddy') {
        drawPixelRect(bx + 4, by - 4, 6, 6, targetSkin.color, "#000");
        drawPixelRect(bx + 24, by - 4, 6, 6, targetSkin.color, "#000");
        drawPixelRect(bx + 12, by + 24, 10, 4, "#000", null);
        drawPixelRect(bx + 6, by - 6, 22, 4, "#000", null);
        drawPixelRect(bx + 10, by - 16, 14, 10, "#000", null);
        drawPixelRect(bx + 10, by - 8, 14, 2, "#d32f2f", null);
    }
    if (targetSkin.hat && targetSkin.id !== 'freddy') {
        drawPixelRect(bx + 8, by - 4, 20, 4, "#000", null);
        drawPixelRect(bx + 12, by - 14, 12, 10, "#000", null);
    }
}

function spawnPipe() { if (!isHost && dataChannel && dataChannel.readyState === "open") return; let gap = 135, minH = 60, maxH = canvas.height - gap - minH; let topH = Math.floor(Math.random() * (maxH - minH + 1)) + minH; pipes.push({x: canvas.width, top: topH, bottom: canvas.height - topH - gap, w: 55, passed: false}); }
function resetGame() { bird.y = 150; bird.velocity = 0; pipes = []; score = 0; gameOver = false; recordChecked = false; spawnPipe(); updateShopUI(); }
function handleJump() { initAudio(); if (gameOver) resetGame(); else { bird.velocity = bird.jump; playSound(440, 0.12, 'square', true); } }

window.addEventListener("keydown", (e) => { if (e.code === "Space" || e.code === "ArrowUp") handleJump(); });
canvas.addEventListener("mousedown", () => { handleJump(); canvas.focus(); }); canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleJump(); }, {passive: false});

function update() {
    if (dataChannel && dataChannel.readyState === "open") {
        dataChannel.send(JSON.stringify({type: 'fly', y: bird.y, skin: currentSkin.id}));
        if (isHost && pipes.length > 0) dataChannel.send(JSON.stringify({type: 'pipe', pipes: JSON.stringify(pipes)}));
    }
    if (gameOver) {
        if (!recordChecked) {
            recordChecked = true; playSound(100, 0.4, 'sawtooth', false); let currentCoins = parseInt(localStorage.getItem('flappy_total_coins')) || 0;
            localStorage.setItem('flappy_total_coins', currentCoins + score); sendHighScoreOnline(score);
        }return;
    }
    bird.velocity += bird.gravity; bird.y += bird.velocity; if ((bird.y + bird.h) > canvas.height || bird.y < 0) gameOver = true;
    if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) spawnPipe();
    pipes.forEach(p => { p.x -= 2; if (!p.passed && (p.x + p.w) < bird.x) { score++; p.passed = true; updateShopUI(); playSound(600, 0.08, 'square', false); } if ((bird.x + bird.w) > p.x && bird.x < (p.x + p.w) && (bird.y < p.top || (bird.y + bird.h) > (canvas.height - p.bottom))) gameOver = true; });
    pipes = pipes.filter(p => (p.x + p.w) > 0);
}

function draw() {
    ctx.fillStyle = getSkyColor(); ctx.fillRect(0, 0, canvas.width, canvas.height); drawPixelBird(bird.x, bird.y, currentSkin.id);
    if (enemyBird.active) { ctx.globalAlpha = 0.6; drawPixelBird(bird.x, enemyBird.y, enemyBird.currentSkinId); ctx.globalAlpha = 1.0; }
    pipes.forEach(p => {
        drawPixelRect(p.x, 0, p.w, p.top, "#73bf2e"); ctx.fillStyle = "#9de64e"; ctx.fillRect(Math.floor(p.x + 6), 0, 6, Math.floor(p.top)); drawPixelRect(p.x-4, p.top-24, p.w+8, 24, "#73bf2e"); ctx.fillStyle = "#9de64e"; ctx.fillRect(Math.floor(p.x+2), Math.floor(p.top-22), 6, 20);
        let bTop = canvas.height - p.bottom; drawPixelRect(p.x, bTop, p.w, p.bottom, "#73bf2e"); ctx.fillStyle = "#9de64e"; ctx.fillRect(Math.floor(p.x + 6), Math.floor(bTop), 6, Math.floor(p.bottom)); drawPixelRect(p.x-4, bTop, p.w+8, 24, "#73bf2e"); ctx.fillStyle = "#9de64e"; ctx.fillRect(Math.floor(p.x+2), Math.floor(bTop + 2), 6, 20);
    });
    ctx.fillStyle = "#fff"; ctx.font = "bold 32px 'Courier New'"; ctx.fillText(score, canvas.width / 2 - 12, 50);
    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff"; ctx.font = "bold 30px 'Courier New'"; ctx.fillText("GAME OVER", 110, 220);
        ctx.font = "16px 'Courier New'"; ctx.fillText("PRESS JUMP TO RESTART", 100, 270);
    }
}
function loop() { update(); draw(); requestAnimationFrame(loop); }
currentSkin = skins[0]; resetGame(); fetchOnlineLeaderboard(); loop();
}, 200);
</script>
</body>
</html>
