<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird MMO: Global Lobby Edition</title>
    <style>
        body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;font-family:'Courier New',monospace;color:white;padding:10px;box-sizing:border-box;}
        .container{display:flex;gap:20px;background:#222;padding:20px;border:4px solid #444;box-shadow:10px 10px 0px #000;border-radius:15px;max-width:100%;box-sizing:border-box;}
        canvas{border:4px solid #444;border-radius:12px;image-rendering:pixelated;max-width:100%;height:auto;display:block;}
        .side-panel{display:flex;flex-direction:column;gap:15px;width:340px;max-width:100%;}
        .shop,.multiplayer-box,.leaderboard,.settings{background:#000;padding:15px;display:flex;flex-direction:column;gap:10px;border:4px solid #444;border-radius:10px;}
        h2{margin:0;text-align:center;font-size:16px;text-transform:uppercase;border-bottom:4px dashed #444;padding-bottom:8px;}
        .coins-display{color:#ffd700;font-size:16px;text-align:center;font-weight:bold;background:#222;padding:8px;border:2px solid #ffd700;}
        .mp-btn{background:#1565c0;color:white;border:2px solid #fff;padding:8px;cursor:pointer;font-weight:bold;font-size:12px;text-transform:uppercase;}
        .room-item{display:flex;justify-content:space-between;align-items:center;background:#222;padding:6px 10px;border:2px solid #444;font-size:11px;margin-bottom:2px;}
        .join-btn{background:#2e7d32;color:white;border:1px solid #fff;padding:4px 8px;cursor:pointer;font-weight:bold;font-size:10px;}
        .skin-item,.leader-item{display:flex;align-items:center;justify-content:space-between;background:#111;padding:8px 12px;border:2px solid #333;}
        .skin-name{font-weight:bold;font-size:14px;text-transform:uppercase;}
        .shop-btn{background:#00aa00;color:white;border:2px solid #fff;padding:6px 10px;cursor:pointer;font-weight:bold;min-width:85px;}
        .shop-btn:disabled{background:#444;color:#888;cursor:not-allowed;border-color:#555;}
        .shop-btn.equipped{background:#0000aa;}
        .setting-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;background:#111;padding:8px 12px;border:2px solid #333;}
        .setting-row input{width:16px;height:16px;cursor:pointer;}
        #rooms-list{max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-top:5px;background:#111;padding:5px;border:2px solid #333;}
        @media(max-width:768px){.container{flex-direction:column;align-items:center;}canvas,.side-panel{width:100%;max-width:400px;}}
    </style>
    <script src="https://jsdelivr.net"></script>
</head>
<body>
<div class="container"> 
    <canvas id="canvas" width="400" height="500"></canvas> 
    <div class="side-panel">
        <div class="multiplayer-box">
            <h2>GLOBAL ONLINE LOBBY</h2>
            <button class="mp-btn" id="host-btn" onclick="createNewServerRoom()" style="width:100%;">CREATE NEW GAME</button>
            <div style="font-size:10px;color:#aaa;margin-top:5px;text-align:center;text-transform:uppercase;font-weight:bold;">Игроки на сайте / Комнаты:</div>
            <div id="rooms-list"></div>
            <div id="mp-status" style="text-align:center;font-size:12px;color:#ffd700;margin-top:5px;">Одиночный режим</div>
        </div>
        <div class="shop"> 
            <h2>SHOP</h2> 
            <div class="coins-display">COINS: <span id="coin-count">0</span></div> 
            <div id="shop-items"></div> 
        </div> 
        <div class="row-widgets">
            <div class="leaderboard">
                <h2>WORLD TOP 3</h2>
                <div id="leader-items">Loading...</div>
            </div>
            <div class="settings">
                <h2>AUDIO</h2>
                <div class="setting-row"><span>MUSIC</span><input type="checkbox" id="music-toggle" checked></div>
                <div class="setting-row"><span>SFX</span><input type="checkbox" id="sfx-toggle" checked></div>
            </div>
        </div>
    </div>
</div>
<script>
const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
let bird = {x: 50, y: 150, w: 34, h: 24, gravity: 0.4, velocity: 0, jump: -6.2};
let enemyBird = {y: 150, active: false, currentSkinId: 'default'};
let pipes = [], score = 0, coins = 0, gameOver = false, recordChecked = false;

let myPlayerName = localStorage.getItem('flappy_device_name_v9');
if (!myPlayerName) {
    let userName = prompt("ДОБРО ПОЖАЛОВАТЬ В ЖИВОЕ MMO ЛОББИ! Введите ваш ник:", "Игрок");
    if (!userName || !userName.trim()) userName = "User_" + Math.floor(1000 + Math.random() * 9000);
    myPlayerName = userName.substring(0, 10).trim().replace(/[^a-zA-Z0-9а-яА-Я]/g, "");
    localStorage.setItem('flappy_device_name_v9', myPlayerName);
}

const gun = Gun(['https://herokuapp.com']);
const lobbyNode = gun.get('flappy_mmo_global_lobby_2026');

let isHost = false, myRoomId = "";
const musicToggle = document.getElementById("music-toggle"), sfxToggle = document.getElementById("sfx-toggle");
let audioCtx = null, musicInterval = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audioCtx && !musicInterval) startAmbientMusic();
}

function playSound(freq, duration, type = 'sine', ramp = true) {
    if (!sfxToggle.checked) return;
    if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; } }
    if (audioCtx.state === 'suspended') return;
    try {
        let osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (ramp) osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + duration);
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); 
        gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch (e) {}
}

function startAmbientMusic() {
    if (musicInterval) clearInterval(musicInterval);
    let notes = [130.81, 146.83, 164.81, 196.00], step = 0;
    musicInterval = setInterval(() => {
        if (musicToggle.checked && audioCtx && audioCtx.state === 'running' && !gameOver) {
            try {
                let osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.02, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.8); step++;
            } catch (e) {}
        }
    }, 1000);
}

function getSkyColor() { return "rgb(112, 197, 206)"; }

const birdMapRaw = ["00000111111000000", "00001222222110000", "00112222221331000", "01225522213113100", "12222552213113100", "12222222221331000", "12222222222111100", "1222222224444410", "0122222241111410", "0011222441114100", "0000114444441000", "0000001111110000"];

const skins = [
    {id: 'default', name: 'Classic Duck', color: '#f8e71c', beak: '#ff5722', hat: false, price: 0, purchased: true},
    {id: 'cyber', name: 'Cyber Agent', color: '#00e5ff', beak: '#ff007f', hat: false, price: 50, purchased: false},
    {id: 'pirate', name: 'Pirate Bird', color: '#4e342e', beak: '#ffb300', hat: true, price: 100, purchased: false},
    {id: 'freddy', name: 'Bonnie Rabbit', color: '#673ab7', beak: '#3e2723', hat: true, price: 15, purchased: false},
    {id: 'king', name: 'Rich King', color: '#ffd700', beak: '#d84315', hat: true, price: 300, purchased: false}
];
let currentSkin = skins[0]; // Жесткая фиксация объекта!
let personalBest = parseInt(localStorage.getItem('flappy_personal_best')) || 0;
let localLeaderboard = JSON.parse(localStorage.getItem('flappy_local_top4')) || [];
function sendHighScoreOnline(finalScore) {
    if (finalScore <= 0) return;
    if (finalScore > personalBest) { personalBest = finalScore; localStorage.setItem('flappy_personal_best', personalBest); }
    let existing = localLeaderboard.find(p => p.name === myPlayerName);
    if (existing) { if (finalScore > existing.score) existing.score = finalScore; } 
    else { localLeaderboard.push({name: myPlayerName, score: finalScore}); }
    fetchOnlineLeaderboard();
}

function fetchOnlineLeaderboard() {
    const container = document.getElementById("leader-items"); if (!container) return; container.innerHTML = "";
    localLeaderboard.sort((a, b) => parseInt(b.score) - parseInt(a.score));
    localLeaderboard = localLeaderboard.slice(0, 3);
    localStorage.setItem('flappy_local_top4', JSON.stringify(localLeaderboard));
    if (localLeaderboard.length === 0) { container.innerHTML = "<div style='text-align:center;color:#666;'>НЕТ РЕКОРДОВ</div>"; } 
    else {
        localLeaderboard.forEach((player, index) => {
            const item = document.createElement("div"); item.className = "leader-item";
            item.innerHTML = `<span>#${index + 1} ${player.name}</span><span style='font-weight:bold'>${player.score}</span>`;
            container.appendChild(item);
        });
    }
}

window.createNewServerRoom = function() {
    initAudio(); isHost = true; myRoomId = "room_" + Math.floor(1000 + Math.random() * 9000);
    document.getElementById("host-btn").style.display = "none";
    document.getElementById("mp-status").innerHTML = "🟢 ТВОЯ КОМНАТА В ЛОББИ!";
    lobbyNode.get(myRoomId).put({ hostName: myPlayerName, pipes: "", enemyY: 150, enemySkin: currentSkin.id, lastActive: Date.now() });
}

window.joinServerRoom = function(roomId) {
    initAudio(); isHost = false; myRoomId = roomId;
    document.getElementById("host-btn").style.display = "none";
    document.getElementById("mp-status").innerHTML = "🟢 ПОДКЛЮЧЕН К ИГРОКУ!";
    enemyBird.active = true;
}

setInterval(() => {
    if (lobbyNode && myPlayerName) { lobbyNode.get('online_users').get(myPlayerName).put(Date.now()); }
}, 4000);

lobbyNode.map().on((data, id) => {
    if (!data) return;
    const container = document.getElementById("rooms-list"); if (!container) return;
    
    if (id === 'online_users') {
        let now = Date.now();
        Object.keys(data).forEach(user => {
            if (user !== '_' && now - data[user] < 10000 && !document.getElementById("usr_" + user)) {
                let div = document.createElement("div"); div.id = "usr_" + user; div.className = "room-item";
                div.innerHTML = `<span style="color:#00ff00">● ${user}</span><span style="font-size:9px;color:#aaa">ONLINE</span>`;
                container.appendChild(div);
            } else if (now - data[user] >= 10000 && document.getElementById("usr_" + user)) {
                document.getElementById("usr_" + user).remove();
            }
        });
        return;
    }
    
    if (id.startsWith("room_") && Date.now() - data.lastActive < 10000) {
        if (document.getElementById(id)) return;
        let div = document.createElement("div"); div.id = id; div.className = "room-item";
        div.innerHTML = `<span>🎮 Лобби: ${data.hostName}</span><button class="join-btn" onclick="joinServerRoom('${id}')">JOIN</button>`;
        container.appendChild(div);
    }
});

setInterval(() => {
    if (!myRoomId) return;
    if (isHost) {
        lobbyNode.get(myRoomId).put({ enemyY: bird.y, enemySkin: currentSkin.id, pipes: JSON.stringify(pipes), lastActive: Date.now() });
        lobbyNode.get(myRoomId).get('guestData').on(data => { if(data) { enemyBird.active = true; enemyBird.y = data.y; enemyBird.currentSkinId = data.skin; } });
    } else {
        lobbyNode.get(myRoomId).put({ guestData: { y: bird.y, skin: currentSkin.id }, lastActive: Date.now() });
        lobbyNode.get(myRoomId).on(data => { if(data) { enemyBird.y = data.enemyY; enemyBird.currentSkinId = data.enemySkin; if (data.pipes) pipes = JSON.parse(data.pipes); } });
    }
}, 40);
function drawPixelRect(x, y, w, h, fillColor) { 
    ctx.fillStyle = fillColor; ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h)); 
    ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.strokeRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h)); 
}

function drawPixelBird(bx, by, skinId) {
    let targetSkin = skins.find(s => s.id === skinId) || skins[0]; let pSize = 2;
    for (let r = 0; r < birdMapRaw.length; r++) {
        for (let c = 0; c < birdMapRaw[r].length; c++) {
            let pixelChar = birdMapRaw[r][c]; if (pixelChar === "0") continue;
            let px = bx + (c * pSize), py = by + (r * pSize), color = "#000";
            if (pixelChar === "1") color = "#000"; else if (pixelChar === "2") color = targetSkin.color; else if (pixelChar === "3") color = '#fff'; else if (pixelChar === "4") color = targetSkin.beak; else if (pixelChar === "5") color = '#fff';
            ctx.fillStyle = color; ctx.fillRect(Math.floor(px), Math.floor(py), pSize, pSize);
        }
    }
    
    // ОРИГИНАЛЬНЫЕ КАНОНИЧНЫЕ КРЫЛЬЯ FLAPPY BIRD
    ctx.fillStyle = "#000"; ctx.fillRect(Math.floor(bx + 4), Math.floor(by + 10), 12, 8); 
    ctx.fillStyle = (targetSkin.id === 'freddy') ? "#4e342e" : "#d8a000"; ctx.fillRect(Math.floor(bx + 6), Math.floor(by + 12), 8, 4); 
    ctx.fillStyle = (targetSkin.id === 'freddy') ? "#b39ddb" : "#fff"; ctx.fillRect(Math.floor(bx + 6), Math.floor(by + 10), 8, 2); 

    // ПОПИКСЕЛЬНЫЙ КАНОНИЧНЫЙ КРОЛИК БОННИ (СМОТРИТ НАПРАВО)
    if (targetSkin.id === 'freddy') {
        ctx.fillStyle = "#673ab7"; ctx.fillRect(Math.floor(bx), Math.floor(by), 34, 24);
        ctx.fillStyle = "#000"; ctx.strokeRect(Math.floor(bx), Math.floor(by), 34, 24);
        ctx.fillStyle = "#fff"; ctx.fillRect(Math.floor(bx + 14), Math.floor(by + 4), 6, 6); ctx.fillRect(Math.floor(bx + 24), Math.floor(by + 4), 6, 6);
        ctx.fillStyle = "#00a2e8"; ctx.fillRect(Math.floor(bx + 16), Math.floor(by + 6), 2, 4); ctx.fillRect(Math.floor(bx + 26), Math.floor(by + 6), 2, 4);
        drawPixelRect(bx + 4, by - 12, 6, 12, "#673ab7"); drawPixelRect(bx + 6, by - 10, 2, 8, "#b39ddb"); 
        drawPixelRect(bx + 18, by - 12, 6, 12, "#673ab7"); drawPixelRect(bx + 20, by - 10, 2, 8, "#b39ddb"); 
        drawPixelRect(bx + 14, by + 12, 14, 8, "#e0e0e0"); ctx.fillStyle = "#000"; ctx.fillRect(Math.floor(bx + 22), Math.floor(by + 12), 4, 3); 
    }
    if (targetSkin.hat && targetSkin.id !== 'freddy') {
        ctx.fillStyle = "#000"; ctx.fillRect(Math.floor(bx + 8), Math.floor(by - 4), 20, 4); ctx.fillRect(Math.floor(bx + 12), Math.floor(by - 14), 12, 10);
    }
}

function spawnPipe() { if (!isHost && myRoomId) return; let gap = 135, minH = 60, maxH = canvas.height - gap - minH; let topH = Math.floor(Math.random() * (maxH - minH + 1)) + minH; pipes.push({x: canvas.width, top: topH, bottom: canvas.height - topH - gap, w: 55, passed: false}); }
function resetGame() { bird.y = 150; bird.velocity = 0; if (isHost || !myRoomId) pipes = []; score = 0; gameOver = false; recordChecked = false; spawnPipe(); updateShopUI(); }
function handleJump() { initAudio(); if (gameOver) resetGame(); else { bird.velocity = bird.jump; playSound(440, 0.12, 'square', true); } }

window.addEventListener("keydown", (e) => { if (e.code === "Space" || e.code === "ArrowUp") handleJump(); });
canvas.addEventListener("mousedown", () => { handleJump(); canvas.focus(); }); canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleJump(); }, {passive: false});

function update() {
    if (gameOver) {
        if (!recordChecked) {
            recordChecked = true; playSound(100, 0.4, 'sawtooth', false); let currentCoins = parseInt(localStorage.getItem('flappy_total_coins')) || 0;
            localStorage.setItem('flappy_total_coins', currentCoins + score + 1); sendHighScoreOnline(score);
        }return;
    }
    bird.velocity += bird.gravity; bird.y += bird.velocity; if ((bird.y + bird.h) > canvas.height || bird.y < 0) gameOver = true;
    if ((isHost || !myRoomId) && (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200)) spawnPipe();
    pipes.forEach(p => { p.x -= 2; if (!p.passed && (p.x + p.w) < bird.x) { score++; p.passed = true; updateShopUI(); playSound(600, 0.08, 'square', false); } if ((bird.x + bird.w) > p.x && bird.x < (p.x + p.w) && (bird.y < p.top || (bird.y + bird.h) > (canvas.height - p.bottom))) gameOver = true; });
    pipes = pipes.filter(p => (p.x + p.w) > 0);
}

function draw() {
    ctx.fillStyle = getSkyColor(); ctx.fillRect(0, 0, canvas.width, canvas.height); drawPixelBird(bird.x, bird.y, currentSkin[0].id);
    if (enemyBird.active) { ctx.globalAlpha = 0.6; drawPixelBird(bird.x, enemyBird.y, enemyBird.currentSkinId); ctx.globalAlpha = 1.0; }
    
    pipes.forEach(p => { 
        drawPixelRect(p.x, 0, p.w, p.top, "#73bf2e"); ctx.fillStyle = "#9de64e"; ctx.fillRect(Math.floor(p.x + 6), 0, 6, Math.floor(p.top)); ctx.fillStyle = "#fff"; ctx.fillRect(Math.floor(p.x + 6), 0, 2, Math.floor(p.top));
        drawPixelRect(p.x - 4, p.top - 24, p.w + 8, 24, "#73bf2e"); ctx.fillStyle = "#9de64e"; ctx.fillRect(Math.floor(p.x - 2), Math.floor(p.top - 22), 6, 20); ctx.fillStyle = "#fff"; ctx.fillRect(Math.floor(p.x - 2), Math.floor(p.top - 22), 2, 20);
        let bTop = canvas.height - p.bottom; drawPixelRect(p.x, bTop, p.w, p.bottom, "#73bf2e"); ctx.fillStyle = "#9de64e"; ctx.fillRect(Math.floor(p.x + 6), Math.floor(bTop), 6, Math.floor(p.bottom)); ctx.fillStyle = "#fff"; ctx.fillRect(Math.floor(p.x + 6), Math.floor(bTop), 2, Math.floor(p.bottom));
        drawPixelRect(p.x - 4, bTop, p.w + 8, 24, "#73bf2e"); ctx.fillStyle = "#9de64e"; ctx.fillRect(Math.floor(p.x - 2), Math.floor(bTop + 2), 6, 20); ctx.fillStyle = "#fff"; ctx.fillRect(Math.floor(p.x - 2), Math.floor(bTop + 2), 2, 20);
    });

    ctx.fillStyle = "#fff"; ctx.font = "bold 32px 'Courier New'"; ctx.fillText(score, canvas.width / 2 - 12, 50);
    if (gameOver) { ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#fff"; ctx.font = "bold 30px 'Courier New'"; ctx.fillText("GAME OVER", 110, 220); }
}
function loop() { update(); draw(); requestAnimationFrame(loop); }
currentSkin = skins[0]; resetGame(); loop();
window.addEventListener("load", () => { updateShopUI(); });
</script>
</body>
</html>
